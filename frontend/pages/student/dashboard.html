<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Tổng quan — Học sinh</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__brand">Exam System</span>
        <button class="sidebar__close" id="sidebarClose" aria-label="Đóng menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <nav class="sidebar__nav">
        <a class="nav__item nav__item--active" href="dashboard.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          <span>Tổng quan</span>
        </a>
        <a class="nav__item" href="my-classes.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span>Lớp học</span>
        </a>
        <a class="nav__item" href="exam-list.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          <span>Bài thi</span>
        </a>
        <a class="nav__item" href="history.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          <span>Lịch sử</span>
        </a>
        <a class="nav__item" href="profile.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span>Tài khoản</span>
        </a>
      </nav>
      <div class="sidebar__footer">
        <button class="nav__item nav__item--logout" id="logoutBtn">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          <span>Đăng xuất</span>
        </button>
      </div>
    </aside>
    <div class="backdrop" id="backdrop"></div>

    <div class="layout">
      <header class="header">
        <button class="header__menu" id="sidebarOpen" aria-label="Mở menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <h1 class="header__title">Tổng quan</h1>
        <span class="header__user" id="headerUser">Học sinh</span>
      </header>

      <main class="main">
        <!-- Lời chào -->
        <div class="greeting">
          <p class="greeting__text">
            Xin chào, <strong id="greetName">bạn</strong> 👋
          </p>
          <p class="greeting__sub">Chúc bạn học tốt hôm nay!</p>
        </div>

        <!-- 3 thẻ thống kê nhanh -->
        <div class="stats">
          <div class="stat-card">
            <span class="stat-card__label">Lớp học</span>
            <span class="stat-card__value" id="statClasses">—</span>
            <svg
              class="stat-card__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">Bài đã thi</span>
            <span class="stat-card__value" id="statDone">—</span>
            <svg
              class="stat-card__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </div>
          <div class="stat-card">
            <span class="stat-card__label">Điểm TB</span>
            <span class="stat-card__value" id="statAvg">—</span>
            <svg
              class="stat-card__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
          </div>
        </div>

        <!-- Bài thi sắp diễn ra -->
        <div class="section">
          <div class="section__header">
            <h2 class="section__title">Bài thi sắp diễn ra</h2>
            <a class="btn btn--ghost btn--sm" href="exam-list.html"
              >Xem tất cả</a
            >
          </div>
          <div id="upcomingList">
            <p class="empty-msg">Đang tải...</p>
          </div>
        </div>

        <!-- Kết quả gần nhất -->
        <div class="section">
          <div class="section__header">
            <h2 class="section__title">Kết quả gần nhất</h2>
            <a class="btn btn--ghost btn--sm" href="history.html"
              >Xem lịch sử</a
            >
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Đề thi</th>
                  <th>Điểm</th>
                  <th>Đúng/Tổng</th>
                  <th>Ngày thi</th>
                </tr>
              </thead>
              <tbody id="recentBody">
                <tr>
                  <td colspan="4" class="table__empty">Đang tải...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script>
      const token = localStorage.getItem("token"),
        role = localStorage.getItem("role");
      if (!token || role !== "student")
        window.location.href = "/pages/auth/login.html";
      const sidebar = document.getElementById("sidebar"),
        backdrop = document.getElementById("backdrop");
      document.getElementById("sidebarOpen").addEventListener("click", () => {
        sidebar.classList.add("sidebar--open");
        backdrop.classList.add("backdrop--visible");
        document.body.style.overflow = "hidden";
      });
      document.getElementById("sidebarClose").addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      backdrop.addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "/pages/auth/login.html";
      });

      async function load() {
        try {
          const res = await fetch("/api/student/dashboard", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const d = await res.json();
          if (!res.ok) return;
          document.getElementById("greetName").textContent =
            d.fullName ?? "bạn";
          document.getElementById("headerUser").textContent =
            d.fullName ?? "Học sinh";
          document.getElementById("statClasses").textContent =
            d.totalClasses ?? "0";
          document.getElementById("statDone").textContent = d.totalDone ?? "0";
          document.getElementById("statAvg").textContent =
            d.avgScore != null ? d.avgScore.toFixed(1) + "đ" : "—";

          // Bài thi sắp tới
          const ul = document.getElementById("upcomingList");
          if (!d.upcoming?.length) {
            ul.innerHTML =
              '<p class="empty-msg">Không có bài thi sắp diễn ra.</p>';
          } else {
            ul.innerHTML = d.upcoming
              .map(
                (e) => `
            <div class="exam-card">
              <div class="exam-card__info">
                <span class="exam-card__name">${e.title}</span>
                <span class="exam-card__meta">${e.className} · ${e.examType === "free" ? "Thi tự do" : formatDatetime(e.startTime) + " – " + formatDatetime(e.endTime)}</span>
              </div>
              <span class="status-badge ${getBadgeClass(e)}">${getBadgeText(e)}</span>
            </div>
          `,
              )
              .join("");
          }

          // Kết quả gần nhất
          const tb = document.getElementById("recentBody");
          if (!d.recent?.length) {
            tb.innerHTML =
              '<tr><td colspan="4" class="table__empty">Chưa có kết quả.</td></tr>';
          } else {
            tb.innerHTML = d.recent
              .map(
                (r) => `<tr>
            <td>${r.examTitle ?? "—"}</td>
            <td><strong>${r.score != null ? r.score.toFixed(1) : "-"}</strong></td>
            <td>${r.correctCount ?? 0}/${r.totalQuestions ?? 0}</td>
            <td>${r.finishedAt ? new Date(r.finishedAt).toLocaleDateString("vi-VN") : "—"}</td>
          </tr>`,
              )
              .join("");
          }
        } catch (e) {
          console.error(e);
        }
      }

      function formatDatetime(dt) {
        return dt
          ? new Date(dt).toLocaleString("vi-VN", {
              day: "2-digit",
              month: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
            })
          : "—";
      }
      function getBadgeClass(e) {
        if (e.examType === "free") return "status-badge--free";
        const now = Date.now(),
          start = new Date(e.startTime).getTime(),
          end = new Date(e.endTime).getTime();
        if (now < start) return "status-badge--upcoming";
        if (now <= end) return "status-badge--open";
        return "status-badge--closed";
      }
      function getBadgeText(e) {
        if (e.examType === "free") return "Tự do";
        const now = Date.now(),
          start = new Date(e.startTime).getTime(),
          end = new Date(e.endTime).getTime();
        if (now < start) return "Sắp mở";
        if (now <= end) return "Đang mở";
        return "Đã đóng";
      }
      load();
    </script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Lịch sử thi — Học sinh</title>
    <link rel="stylesheet" href="history.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__brand">Exam System</span
        ><button class="sidebar__close" id="sidebarClose" aria-label="Đóng">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <nav class="sidebar__nav">
        <a class="nav__item" href="dashboard.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" /></svg
          ><span>Tổng quan</span></a
        >
        <a class="nav__item" href="my-classes.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg
          ><span>Lớp học</span></a
        >
        <a class="nav__item" href="exam-list.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" /></svg
          ><span>Bài thi</span></a
        >
        <a class="nav__item nav__item--active" href="history.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" /></svg
          ><span>Lịch sử</span></a
        >
        <a class="nav__item" href="profile.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          ><span>Tài khoản</span></a
        >
      </nav>
      <div class="sidebar__footer">
        <button class="nav__item nav__item--logout" id="logoutBtn">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" /></svg
          ><span>Đăng xuất</span>
        </button>
      </div>
    </aside>
    <div class="backdrop" id="backdrop"></div>

    <div class="layout">
      <header class="header">
        <button class="header__menu" id="sidebarOpen" aria-label="Mở menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <h1 class="header__title">Lịch sử thi</h1>
        <span class="header__user" id="headerUser">Học sinh</span>
      </header>
      <main class="main">
        <div class="section">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Đề thi</th>
                  <th>Lớp</th>
                  <th>Điểm</th>
                  <th>Đúng/Tổng</th>
                  <th>Thời gian nộp</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr>
                  <td colspan="6" class="table__empty">Đang tải...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script>
      const token = localStorage.getItem("token"),
        role = localStorage.getItem("role");
      if (!token || role !== "student")
        window.location.href = "/pages/auth/login.html";
      const sidebar = document.getElementById("sidebar"),
        backdrop = document.getElementById("backdrop");
      document.getElementById("sidebarOpen").addEventListener("click", () => {
        sidebar.classList.add("sidebar--open");
        backdrop.classList.add("backdrop--visible");
        document.body.style.overflow = "hidden";
      });
      document.getElementById("sidebarClose").addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      backdrop.addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "/pages/auth/login.html";
      });

      async function load() {
        try {
          const res = await fetch("/api/student/history", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const d = await res.json();
          if (!res.ok) return;
          document.getElementById("headerUser").textContent =
            d.fullName ?? "Học sinh";
          const tb = document.getElementById("tableBody");
          if (!d.attempts?.length) {
            tb.innerHTML =
              '<tr><td colspan="6" class="table__empty">Chưa có lịch sử thi.</td></tr>';
            return;
          }
          tb.innerHTML = d.attempts
            .map(
              (a) => `<tr>
          <td><strong>${a.examTitle ?? "—"}</strong></td>
          <td>${a.className ?? "—"}</td>
          <td>${a.score != null ? a.score.toFixed(1) + "đ" : "—"}</td>
          <td>${a.correctCount ?? 0}/${a.totalQuestions ?? 0}</td>
          <td>${a.finishedAt ? new Date(a.finishedAt).toLocaleString("vi-VN") : "—"}</td>
          <td><a class="link" href="result.html?attemptId=${a.id}">Xem kết quả</a></td>
        </tr>`,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }
      load();
    </script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đổi mật khẩu</title>
    <link rel="stylesheet" href="change-password.css" />
  </head>
  <body>
    <!-- Ảnh nền — cùng ảnh với trang login -->
    <div class="bg"></div>
    <div class="overlay"></div>

    <main class="page">
      <div class="card">
        <!-- Tiêu đề + mô tả ngắn -->
        <h1 class="card__title">Đổi mật khẩu</h1>
        <p class="card__desc">
          Đây là lần đăng nhập đầu tiên. Vui lòng đặt mật khẩu mới trước khi
          tiếp tục.
        </p>

        <form class="form" id="changePasswordForm" novalidate>
          <!-- Mật khẩu hiện tại -->
          <div class="field">
            <label class="field__label" for="currentPassword"
              >Mật khẩu hiện tại</label
            >
            <div class="field__wrap">
              <input
                class="field__input"
                type="password"
                id="currentPassword"
                name="currentPassword"
                placeholder="Nhập mật khẩu hiện tại"
                autocomplete="current-password"
                required
              />
              <button
                class="field__toggle"
                type="button"
                data-target="currentPassword"
                aria-label="Hiện mật khẩu"
              >
                <svg
                  class="icon icon--open"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="icon icon--closed"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <span class="field__error" id="currentPasswordError"></span>
          </div>

          <!-- Mật khẩu mới -->
          <div class="field">
            <label class="field__label" for="newPassword">Mật khẩu mới</label>
            <div class="field__wrap">
              <input
                class="field__input"
                type="password"
                id="newPassword"
                name="newPassword"
                placeholder="Tối thiểu 6 ký tự"
                autocomplete="new-password"
                required
              />
              <button
                class="field__toggle"
                type="button"
                data-target="newPassword"
                aria-label="Hiện mật khẩu"
              >
                <svg
                  class="icon icon--open"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="icon icon--closed"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <span class="field__error" id="newPasswordError"></span>
          </div>

          <!-- Xác nhận mật khẩu mới -->
          <div class="field">
            <label class="field__label" for="confirmPassword"
              >Xác nhận mật khẩu mới</label
            >
            <div class="field__wrap">
              <input
                class="field__input"
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="Nhập lại mật khẩu mới"
                autocomplete="new-password"
                required
              />
              <button
                class="field__toggle"
                type="button"
                data-target="confirmPassword"
                aria-label="Hiện mật khẩu"
              >
                <svg
                  class="icon icon--open"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  class="icon icon--closed"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <span class="field__error" id="confirmPasswordError"></span>
          </div>

          <!-- Thông báo lỗi từ server -->
          <div
            class="alert"
            id="alertBox"
            role="alert"
            aria-live="polite"
          ></div>

          <!-- Nút xác nhận -->
          <button class="btn" type="submit" id="submitBtn">
            <span class="btn__text">Xác nhận</span>
            <span class="btn__spinner" id="spinner" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </main>

    <script src="../js/auth.js"></script>

    <script>
      // -------------------------------------------------------
      // HIỆN / ẨN MẬT KHẨU — dùng chung cho 3 ô input
      // -------------------------------------------------------
      document.querySelectorAll(".field__toggle").forEach((btn) => {
        btn.addEventListener("click", () => {
          const targetId = btn.dataset.target;
          const input = document.getElementById(targetId);
          const iconOpen = btn.querySelector(".icon--open");
          const iconClosed = btn.querySelector(".icon--closed");

          const isPassword = input.type === "password";
          input.type = isPassword ? "text" : "password";
          iconOpen.style.display = isPassword ? "none" : "block";
          iconClosed.style.display = isPassword ? "block" : "none";
          btn.setAttribute(
            "aria-label",
            isPassword ? "Ẩn mật khẩu" : "Hiện mật khẩu",
          );
        });
      });

      // -------------------------------------------------------
      // SUBMIT FORM
      // -------------------------------------------------------
      const form = document.getElementById("changePasswordForm");
      const alertBox = document.getElementById("alertBox");
      const submitBtn = document.getElementById("submitBtn");
      const spinner = document.getElementById("spinner");
      const btnText = submitBtn.querySelector(".btn__text");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        clearErrors();

        const currentPassword =
          document.getElementById("currentPassword").value;
        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        // Validate phía client
        let hasError = false;

        if (!currentPassword) {
          showFieldError(
            "currentPasswordError",
            "Vui lòng nhập mật khẩu hiện tại.",
          );
          hasError = true;
        }
        if (!newPassword) {
          showFieldError("newPasswordError", "Vui lòng nhập mật khẩu mới.");
          hasError = true;
        } else if (newPassword.length < 6) {
          showFieldError(
            "newPasswordError",
            "Mật khẩu mới phải có ít nhất 6 ký tự.",
          );
          hasError = true;
        } else if (newPassword === currentPassword) {
          showFieldError(
            "newPasswordError",
            "Mật khẩu mới không được trùng mật khẩu hiện tại.",
          );
          hasError = true;
        }
        if (!confirmPassword) {
          showFieldError(
            "confirmPasswordError",
            "Vui lòng xác nhận mật khẩu mới.",
          );
          hasError = true;
        } else if (newPassword !== confirmPassword) {
          showFieldError(
            "confirmPasswordError",
            "Mật khẩu xác nhận không khớp.",
          );
          hasError = true;
        }
        if (hasError) return;

        setLoading(true);

        try {
          const token = localStorage.getItem("token");
          const res = await fetch("/api/auth/change-password", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ currentPassword, newPassword }),
          });

          const data = await res.json();

          if (!res.ok) {
            showAlert(data.message || "Đổi mật khẩu thất bại.");
            return;
          }

          // Đổi thành công → cập nhật token mới (nếu server trả về) rồi redirect
          if (data.token) localStorage.setItem("token", data.token);

          const role = localStorage.getItem("role");
          const roleMap = {
            admin: "/pages/admin/dashboard.html",
            teacher: "/pages/teacher/dashboard.html",
            student: "/pages/student/dashboard.html",
          };
          window.location.href = roleMap[role] || "/";
        } catch (err) {
          showAlert("Không thể kết nối đến máy chủ. Vui lòng thử lại.");
        } finally {
          setLoading(false);
        }
      });

      // -------------------------------------------------------
      // HELPER FUNCTIONS
      // -------------------------------------------------------
      function setLoading(state) {
        submitBtn.disabled = state;
        spinner.style.display = state ? "block" : "none";
        btnText.textContent = state ? "Đang xử lý..." : "Xác nhận";
      }
      function showFieldError(id, msg) {
        const el = document.getElementById(id);
        if (el) el.textContent = msg;
      }
      function showAlert(msg) {
        alertBox.textContent = msg;
        alertBox.classList.add("alert--visible");
      }
      function clearErrors() {
        [
          "currentPasswordError",
          "newPasswordError",
          "confirmPasswordError",
        ].forEach((id) => {
          document.getElementById(id).textContent = "";
        });
        alertBox.textContent = "";
        alertBox.classList.remove("alert--visible");
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <!-- Ảnh nền: thay bg.jpg bằng ảnh của bạn -->
    <div class="bg"></div>
    <div class="overlay"></div>

    <!-- Form đăng nhập -->
    <main class="page">
      <div class="card">
        <h1 class="card__title">Đăng nhập</h1>

        <form class="form" id="loginForm" novalidate>
          <!-- Tên đăng nhập -->
          <div class="field">
            <label class="field__label" for="username">Tên đăng nhập</label>
            <input
              class="field__input"
              type="text"
              id="username"
              name="username"
              placeholder="Nhập mã của bạn"
              autocomplete="username"
              required
            />
            <span class="field__error" id="usernameError"></span>
          </div>

          <!-- Mật khẩu -->
          <div class="field">
            <label class="field__label" for="password">Mật khẩu</label>
            <div class="field__wrap">
              <input
                class="field__input"
                type="password"
                id="password"
                name="password"
                placeholder="Nhập mật khẩu"
                autocomplete="current-password"
                required
              />
              <!-- Nút hiện/ẩn mật khẩu -->
              <button
                class="field__toggle"
                type="button"
                id="togglePassword"
                aria-label="Hiện mật khẩu"
              >
                <!-- Icon mắt mở -->
                <svg
                  class="icon icon--open"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <!-- Icon mắt nhắm -->
                <svg
                  class="icon icon--closed"
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                  />
                  <path
                    d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <span class="field__error" id="passwordError"></span>
          </div>

          <!-- Thông báo lỗi chung từ server -->
          <div
            class="alert"
            id="alertBox"
            role="alert"
            aria-live="polite"
          ></div>

          <!-- Nút đăng nhập -->
          <button class="btn" type="submit" id="submitBtn">
            <span class="btn__text">Đăng nhập</span>
            <span class="btn__spinner" id="spinner" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </main>

    <script src="../js/auth.js"></script>

    <!-- Script xử lý form — chỉ dùng khi chưa có file auth.js -->
    <script>
      // -------------------------------------------------------
      // HIỆN / ẨN MẬT KHẨU
      // -------------------------------------------------------
      const toggleBtn = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const iconOpen = toggleBtn.querySelector(".icon--open");
      const iconClosed = toggleBtn.querySelector(".icon--closed");

      toggleBtn.addEventListener("click", () => {
        const isPassword = passwordInput.type === "password";
        passwordInput.type = isPassword ? "text" : "password";
        iconOpen.style.display = isPassword ? "none" : "block";
        iconClosed.style.display = isPassword ? "block" : "none";
        toggleBtn.setAttribute(
          "aria-label",
          isPassword ? "Ẩn mật khẩu" : "Hiện mật khẩu",
        );
      });

      // -------------------------------------------------------
      // SUBMIT FORM
      // Thay fetch URL và xử lý redirect theo backend của bạn
      // -------------------------------------------------------
      const form = document.getElementById("loginForm");
      const alertBox = document.getElementById("alertBox");
      const submitBtn = document.getElementById("submitBtn");
      const spinner = document.getElementById("spinner");
      const btnText = submitBtn.querySelector(".btn__text");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        // Xoá lỗi cũ
        clearErrors();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        // Validate phía client
        let hasError = false;
        if (!username) {
          showFieldError("usernameError", "Vui lòng nhập tên đăng nhập.");
          hasError = true;
        }
        if (!password) {
          showFieldError("passwordError", "Vui lòng nhập mật khẩu.");
          hasError = true;
        }
        if (hasError) return;

        // Bắt đầu loading
        setLoading(true);

        try {
          // Gọi API đăng nhập
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            // Server trả về lỗi (sai mật khẩu, bị khóa,...)
            showAlert(data.message || "Đăng nhập thất bại.");
            return;
          }

          // Lưu token vào localStorage
          localStorage.setItem("token", data.token);
          localStorage.setItem("role", data.user.role);

          // Redirect theo vai trò
          // - admin   → /pages/admin/dashboard.html
          // - teacher → /pages/teacher/dashboard.html
          // - student → /pages/student/dashboard.html
          const roleMap = {
            admin: "/pages/admin/dashboard.html",
            teacher: "/pages/teacher/dashboard.html",
            student: "/pages/student/dashboard.html",
          };

          // Nếu phải đổi mật khẩu lần đầu → chuyển sang trang đổi mật khẩu
          if (data.user.mustChangePassword) {
            window.location.href = "/pages/auth/change-password.html";
            return;
          }

          window.location.href = roleMap[data.user.role] || "/";
        } catch (err) {
          // Lỗi mạng hoặc server không phản hồi
          showAlert("Không thể kết nối đến máy chủ. Vui lòng thử lại.");
        } finally {
          setLoading(false);
        }
      });

      // -------------------------------------------------------
      // HELPER FUNCTIONS
      // -------------------------------------------------------
      function setLoading(state) {
        submitBtn.disabled = state;
        spinner.style.display = state ? "block" : "none";
        btnText.textContent = state ? "Đang xử lý..." : "Đăng nhập";
      }

      function showFieldError(id, msg) {
        const el = document.getElementById(id);
        if (el) el.textContent = msg;
      }

      function showAlert(msg) {
        alertBox.textContent = msg;
        alertBox.classList.add("alert--visible");
      }

      function clearErrors() {
        document.getElementById("usernameError").textContent = "";
        document.getElementById("passwordError").textContent = "";
        alertBox.textContent = "";
        alertBox.classList.remove("alert--visible");
      }
    </script>
  </body>
</html>

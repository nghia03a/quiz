<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tổng quan — Admin</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <!-- ======================================================
       SIDEBAR — điều hướng
       Trên mobile: ẩn, mở bằng nút hamburger
       ====================================================== -->
    <aside class="sidebar" id="sidebar">
      <!-- Tên hệ thống -->
      <div class="sidebar__header">
        <span class="sidebar__brand">Exam System</span>
        <!-- Nút đóng sidebar trên mobile -->
        <button class="sidebar__close" id="sidebarClose" aria-label="Đóng menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <!-- Menu điều hướng -->
      <nav class="sidebar__nav">
        <a class="nav__item nav__item--active" href="dashboard.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          <span>Tổng quan</span>
        </a>
        <a class="nav__item" href="teachers.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span>Giáo viên</span>
        </a>
        <a class="nav__item" href="students.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
          </svg>
          <span>Học sinh</span>
        </a>
        <a class="nav__item" href="profile.html">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span>Tài khoản</span>
        </a>
      </nav>

      <!-- Nút đăng xuất ở cuối sidebar -->
      <div class="sidebar__footer">
        <button class="nav__item nav__item--logout" id="logoutBtn">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          <span>Đăng xuất</span>
        </button>
      </div>
    </aside>

    <!-- Lớp phủ tối khi sidebar mở trên mobile -->
    <div class="backdrop" id="backdrop"></div>

    <!-- ======================================================
       NỘI DUNG CHÍNH
       ====================================================== -->
    <div class="layout">
      <!-- HEADER -->
      <header class="header">
        <!-- Nút mở sidebar trên mobile -->
        <button class="header__menu" id="sidebarOpen" aria-label="Mở menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>

        <h1 class="header__title">Tổng quan</h1>

        <!-- Tên Admin hiển thị góc phải -->
        <span class="header__user" id="headerUser">Admin</span>
      </header>

      <!-- NỘI DUNG -->
      <main class="main">
        <!-- THỐNG KÊ NHANH — 4 thẻ số liệu -->
        <section class="stats">
          <div class="stat-card">
            <span class="stat-card__label">Giáo viên</span>
            <span class="stat-card__value" id="statTeachers">—</span>
            <svg
              class="stat-card__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>

          <div class="stat-card">
            <span class="stat-card__label">Học sinh</span>
            <span class="stat-card__value" id="statStudents">—</span>
            <svg
              class="stat-card__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
            </svg>
          </div>

          <div class="stat-card">
            <span class="stat-card__label">Lớp học</span>
            <span class="stat-card__value" id="statClasses">—</span>
            <svg
              class="stat-card__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
          </div>

          <div class="stat-card">
            <span class="stat-card__label">Đề thi</span>
            <span class="stat-card__value" id="statExams">—</span>
            <svg
              class="stat-card__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
              />
              <polyline points="14 2 14 8 20 8" />
              <line x1="16" y1="13" x2="8" y2="13" />
              <line x1="16" y1="17" x2="8" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </div>
        </section>

        <!-- TRA CỨU HỌC SINH THEO MÃ SỐ -->
        <section class="section">
          <h2 class="section__title">Tra cứu kết quả học sinh</h2>

          <div class="search-bar">
            <input
              class="search-bar__input"
              type="text"
              id="searchInput"
              placeholder="Nhập mã số học sinh..."
            />
            <button class="search-bar__btn" id="searchBtn">Tìm kiếm</button>
          </div>

          <!-- Kết quả tra cứu — hiện khi có data -->
          <div class="student-result" id="studentResult" style="display: none">
            <div class="student-info">
              <div class="student-info__row">
                <span class="student-info__label">Họ tên</span>
                <span class="student-info__value" id="resultName">—</span>
              </div>
              <div class="student-info__row">
                <span class="student-info__label">Mã số</span>
                <span class="student-info__value" id="resultId">—</span>
              </div>
              <div class="student-info__row">
                <span class="student-info__label">Số bài đã thi</span>
                <span class="student-info__value" id="resultTotal">—</span>
              </div>
              <div class="student-info__row">
                <span class="student-info__label">Điểm trung bình</span>
                <span class="student-info__value" id="resultAvg">—</span>
              </div>
            </div>

            <!-- Bảng lịch sử thi -->
            <div class="table-wrap">
              <table class="table" id="resultTable">
                <thead>
                  <tr>
                    <th>Đề thi</th>
                    <th>Điểm</th>
                    <th>Đúng / Tổng</th>
                    <th>Thời gian nộp</th>
                  </tr>
                </thead>
                <tbody id="resultTableBody">
                  <!-- Dữ liệu sẽ được điền bằng JS -->
                </tbody>
              </table>
            </div>
          </div>

          <!-- Thông báo khi không tìm thấy -->
          <p class="search-empty" id="searchEmpty" style="display: none">
            Không tìm thấy học sinh với mã số này.
          </p>
        </section>
      </main>
    </div>

    <script src="../js/admin.js"></script>

    <script>
      // -------------------------------------------------------
      // KIỂM TRA TOKEN — nếu chưa đăng nhập thì về login
      // -------------------------------------------------------
      const token = localStorage.getItem("token");
      const role = localStorage.getItem("role");
      if (!token || role !== "admin") {
        window.location.href = "/pages/auth/login.html";
      }

      // -------------------------------------------------------
      // SIDEBAR TOGGLE — mở/đóng trên mobile
      // -------------------------------------------------------
      const sidebar = document.getElementById("sidebar");
      const backdrop = document.getElementById("backdrop");
      const sidebarOpen = document.getElementById("sidebarOpen");
      const sidebarClose = document.getElementById("sidebarClose");

      function openSidebar() {
        sidebar.classList.add("sidebar--open");
        backdrop.classList.add("backdrop--visible");
        document.body.style.overflow = "hidden";
      }
      function closeSidebar() {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      }

      sidebarOpen.addEventListener("click", openSidebar);
      sidebarClose.addEventListener("click", closeSidebar);
      backdrop.addEventListener("click", closeSidebar);

      // -------------------------------------------------------
      // ĐĂNG XUẤT
      // -------------------------------------------------------
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("token");
        localStorage.removeItem("role");
        window.location.href = "/pages/auth/login.html";
      });

      // -------------------------------------------------------
      // TẢI THỐNG KÊ TỔNG QUAN
      // Gọi GET /api/admin/stats → nhận { teachers, students, classes, exams }
      // -------------------------------------------------------
      async function loadStats() {
        try {
          const res = await fetch("/api/admin/stats", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          if (!res.ok) return;

          document.getElementById("statTeachers").textContent =
            data.teachers ?? "—";
          document.getElementById("statStudents").textContent =
            data.students ?? "—";
          document.getElementById("statClasses").textContent =
            data.classes ?? "—";
          document.getElementById("statExams").textContent = data.exams ?? "—";
          document.getElementById("headerUser").textContent =
            data.adminName ?? "Admin";
        } catch (err) {
          console.error("Lỗi tải thống kê:", err);
        }
      }

      // -------------------------------------------------------
      // TRA CỨU HỌC SINH THEO MÃ SỐ
      // Gọi GET /api/admin/students/:studentId/stats
      // -------------------------------------------------------
      document
        .getElementById("searchBtn")
        .addEventListener("click", searchStudent);
      document
        .getElementById("searchInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") searchStudent();
        });

      async function searchStudent() {
        const studentId = document.getElementById("searchInput").value.trim();
        const resultBox = document.getElementById("studentResult");
        const emptyMsg = document.getElementById("searchEmpty");

        resultBox.style.display = "none";
        emptyMsg.style.display = "none";

        if (!studentId) return;

        try {
          const res = await fetch(`/api/admin/students/${studentId}/stats`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();

          if (!res.ok || !data.student) {
            emptyMsg.style.display = "block";
            return;
          }

          // Điền thông tin học sinh
          document.getElementById("resultName").textContent =
            data.student.fullName ?? "—";
          document.getElementById("resultId").textContent =
            data.student.studentId ?? "—";
          document.getElementById("resultTotal").textContent =
            data.student.totalExams ?? "0";
          document.getElementById("resultAvg").textContent =
            data.student.avgScore != null
              ? data.student.avgScore.toFixed(1)
              : "—";

          // Điền bảng lịch sử thi
          const tbody = document.getElementById("resultTableBody");
          tbody.innerHTML = "";

          if (data.attempts && data.attempts.length > 0) {
            data.attempts.forEach((attempt) => {
              const tr = document.createElement("tr");
              tr.innerHTML = `
              <td>${attempt.examTitle ?? "—"}</td>
              <td>${attempt.score != null ? attempt.score.toFixed(1) : "—"}</td>
              <td>${attempt.correctCount ?? 0} / ${attempt.totalQuestions ?? 0}</td>
              <td>${attempt.finishedAt ? new Date(attempt.finishedAt).toLocaleString("vi-VN") : "—"}</td>
            `;
              tbody.appendChild(tr);
            });
          } else {
            tbody.innerHTML =
              '<tr><td colspan="4" class="table__empty">Chưa có lịch sử thi.</td></tr>';
          }

          resultBox.style.display = "block";
        } catch (err) {
          emptyMsg.textContent = "Lỗi kết nối. Vui lòng thử lại.";
          emptyMsg.style.display = "block";
        }
      }

      // Tải số liệu khi trang mở
      loadStats();
    </script>
  </body>
</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Chi tiết lớp — Giáo viên</title>
    <link rel="stylesheet" href="class-detail.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__brand">Exam System</span
        ><button class="sidebar__close" id="sidebarClose" aria-label="Đóng">

            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <nav class="sidebar__nav">
        <a class="nav__item" href="dashboard.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" /></svg
          ><span>Tổng quan</span></a
        >
        <a class="nav__item nav__item--active" href="classes.html"
          ><svg
            class="nav__icon"

          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg
          ><span>Lớp học</span></a
        >
        <a class="nav__item" href="question-bank.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"

              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" /></svg
          ><span>Đề thi</span></a
        >
        <a class="nav__item" href="results.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"

            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg
          ><span>Kết quả</span></a
        >
        <a class="nav__item" href="profile.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          ><span>Tài khoản</span></a
        >
      </nav>
      <div class="sidebar__footer">
        <button class="nav__item nav__item--logout" id="logoutBtn">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />

          ><span>Đăng xuất</span>
        </button>
      </div>
    </aside>
    <div class="backdrop" id="backdrop"></div>
    <div class="layout">
      <header class="header">
        <button class="header__menu" id="sidebarOpen" aria-label="Mở menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <a class="header__back" href="classes.html"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <polyline points="15 18 9 12 15 6" /></svg
          >Lớp học</a
        >
        <h1 class="header__title" id="headerTitle">Chi tiết lớp</h1>
        <span class="header__user" id="headerUser">Giáo viên</span>
      </header>
      <main class="main">
        <!-- Thông tin lớp -->
        <div class="section">
          <div class="class-info">
            <div>
              <h2 class="class-name" id="className">—</h2>
              <p class="class-desc" id="classDesc"></p>
            </div>
            <div class="class-code-box">
              <span class="class-code-label">Mã lớp cho học sinh</span>
              <span class="class-code-val" id="classCode">—</span>
              <button class="btn btn--ghost btn--sm" id="copyCodeBtn">
                Sao chép
              </button>
            </div>
          </div>
          <div class="info-grid" style="margin-top: 0.5rem">
            <div class="info-item">
              <span class="info-item__label">Số học sinh</span
              ><span class="info-item__value" id="infoStudents">—</span>
            </div>
            <div class="info-item">
              <span class="info-item__label">Số đề thi</span
              ><span class="info-item__value" id="infoExams">—</span>
            </div>
          </div>
        </div>
        <!-- Danh sách học sinh -->
        <div class="section">
          <div class="section__header">
            <h2 class="section__title">Học sinh trong lớp</h2>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Mã số HS</th>
                  <th>Họ và tên</th>
                  <th>Ngày tham gia</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr>
                  <td colspan="4" class="table__empty">Đang tải...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <!-- Modal xác nhận xóa học sinh khỏi lớp -->
    <div class="modal-overlay" id="confirmOverlay">
      <div class="modal modal--sm">
        <div class="modal__header">
          <h2 class="modal__title">Xóa khỏi lớp</h2>
        </div>
        <p class="modal__desc" id="confirmDesc"></p>
        <div class="modal__actions">
          <button class="btn btn--ghost" id="confirmCancel">Hủy</button
          ><button class="btn btn--danger" id="confirmOk">Xóa</button>
        </div>
      </div>
    </div>

</html>

<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />

  </head>
  <body>

      <div class="sidebar__header">
        <span class="sidebar__brand">Exam System</span
        ><button class="sidebar__close" id="sidebarClose" aria-label="Đóng">

            stroke-linecap="round"

            class="icon"
          >
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <nav class="sidebar__nav">
        <a class="nav__item" href="dashboard.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" /></svg
          ><span>Tổng quan</span></a
        >
        <a class="nav__item" href="classes.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg
          ><span>Lớp học</span></a
        >
        <a class="nav__item" href="question-bank.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 20h9" />
            <path
              d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
            /></svg
          ><span>Câu hỏi</span></a
        >
        <a class="nav__item nav__item--active" href="manage-exams.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" /></svg
          ><span>Đề thi</span></a
        >
        <a class="nav__item" href="results.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg
          ><span>Kết quả</span></a
        >
        <a class="nav__item" href="profile.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          ><span>Tài khoản</span></a
        >
      </nav>
      <div class="sidebar__footer">
        <button class="nav__item nav__item--logout" id="logoutBtn">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" /></svg
          ><span>Đăng xuất</span>
        </button>
      </div>
    </aside>
    <div class="backdrop" id="backdrop"></div>
    <div class="layout">
      <header class="header">
        <button class="header__menu" id="sidebarOpen" aria-label="Mở menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <h1 class="header__title">Đề thi</h1>
        <span class="header__user" id="headerUser">Giáo viên</span>
      </header>
      <main class="main">
        <div class="toolbar">
          <div class="search-bar">
            <input
              class="search-bar__input"
              type="text"
              id="searchInput"
              placeholder="Tìm tiêu đề đề thi..."
            /><button class="search-bar__btn" id="searchBtn">Tìm</button>
          </div>
          <a class="btn btn--primary" href="create-exam.html">+ Tạo đề thi</a>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab filter-tab--active" data-status="all">
            Tất cả
          </button>
          <button class="filter-tab" data-status="published">
            Đã xuất bản
          </button>
          <button class="filter-tab" data-status="draft">Bản nháp</button>
        </div>
        <div class="section">
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Tiêu đề</th>
                  <th>Loại</th>
                  <th>Câu hỏi</th>
                  <th>Thời gian</th>
                  <th>Trạng thái</th>
                  <th>Thao tác</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr>
                  <td colspan="6" class="table__empty">Đang tải...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <!-- Modal xác nhận xóa -->
    <div class="modal-overlay" id="confirmOverlay">
      <div class="modal modal--sm">
        <div class="modal__header">
          <h2 class="modal__title">Xác nhận xóa</h2>
        </div>
        <p class="modal__desc" id="confirmDesc"></p>
        <div class="modal__actions">
          <button class="btn btn--ghost" id="confirmCancel">Hủy</button
          ><button class="btn btn--danger" id="confirmOk">Xóa</button>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("token"),
        role = localStorage.getItem("role");
      if (!token || role !== "teacher")
        window.location.href = "/pages/auth/login.html";
      const sidebar = document.getElementById("sidebar"),
        backdrop = document.getElementById("backdrop");
      document.getElementById("sidebarOpen").addEventListener("click", () => {
        sidebar.classList.add("sidebar--open");
        backdrop.classList.add("backdrop--visible");
        document.body.style.overflow = "hidden";
      });
      document.getElementById("sidebarClose").addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      backdrop.addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "/pages/auth/login.html";
      });

      let allExams = [],
        currentFilter = "all",
        pendingDeleteId = null;
      function fmt(dt) {
        return dt
          ? new Date(dt).toLocaleString("vi-VN", {
              day: "2-digit",
              month: "2-digit",
              hour: "2-digit",
              minute: "2-digit",
            })
          : "—";
      }

      async function load() {
        try {
          const res = await fetch("/api/teacher/exams", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const d = await res.json();
          if (!res.ok) return;
          document.getElementById("headerUser").textContent =
            d.teacherName ?? "Giáo viên";
          allExams = d.exams ?? [];
          render();
        } catch (e) {
          console.error(e);
        }
      }

      function render() {
        const q = document
          .getElementById("searchInput")
          .value.trim()
          .toLowerCase();
        const list = allExams.filter((e) => {
          const ms = !q || e.title.toLowerCase().includes(q);
          const mf =
            currentFilter === "all" ||
            (currentFilter === "published" && e.isPublished) ||
            (currentFilter === "draft" && !e.isPublished);
          return ms && mf;
        });
        const tb = document.getElementById("tableBody");
        if (!list.length) {
          tb.innerHTML =
            '<tr><td colspan="6" class="table__empty">Không có đề thi nào.</td></tr>';
          return;
        }
        tb.innerHTML = list
          .map(
            (e) => `<tr>
        <td><strong>${e.title}</strong></td>
        <td>${e.examType === "free" ? "Tự do" : "Theo lịch"}</td>
        <td>${e.questionCount ?? 0}</td>
        <td>${e.timeLimit} phút</td>
        <td><span class="status-badge ${e.isPublished ? "status-badge--published" : "status-badge--draft"}">${e.isPublished ? "Đã xuất bản" : "Bản nháp"}</span></td>
        <td><div class="action-group">
          <a class="action-btn" href="create-exam.html?id=${e.id}">Sửa</a>
          ${e.isPublished ? `<a class="action-btn" href="monitor.html?examId=${e.id}">Giám sát</a>` : ""}
          <a class="action-btn" href="results.html?examId=${e.id}">Kết quả</a>
          <button class="action-btn action-btn--danger" onclick="confirmDelete('${e.id}','${e.title}')">Xóa</button>
        </div></td>
      </tr>`,
          )
          .join("");
      }

      document.getElementById("searchBtn").addEventListener("click", render);
      document
        .getElementById("searchInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") render();
        });
      document.querySelectorAll(".filter-tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-tab")
            .forEach((b) => b.classList.remove("filter-tab--active"));
          btn.classList.add("filter-tab--active");
          currentFilter = btn.dataset.status;
          render();
        });
      });

      function confirmDelete(id, title) {
        pendingDeleteId = id;
        document.getElementById("confirmDesc").textContent =
          `Xóa đề thi "${title}"? Hành động không thể hoàn tác.`;
        document
          .getElementById("confirmOverlay")
          .classList.add("modal-overlay--visible");
        document.body.style.overflow = "hidden";
      }
      document.getElementById("confirmCancel").addEventListener("click", () => {
        document
          .getElementById("confirmOverlay")
          .classList.remove("modal-overlay--visible");
        document.body.style.overflow = "";
        pendingDeleteId = null;
      });
      document
        .getElementById("confirmOk")
        .addEventListener("click", async () => {
          if (!pendingDeleteId) return;
          document
            .getElementById("confirmOverlay")
            .classList.remove("modal-overlay--visible");
          document.body.style.overflow = "";
          try {
            await fetch(`/api/teacher/exams/${pendingDeleteId}`, {
              method: "DELETE",
              headers: { Authorization: `Bearer ${token}` },
            });
            load();
          } catch {
            alert("Lỗi kết nối.");
          }
          pendingDeleteId = null;
        });
      load();
    </script>
  </body>
</html>

  </head>

            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>

      </div>
      <nav class="sidebar__nav">
        <a class="nav__item" href="dashboard.html"
          ><svg

            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" /></svg
          ><span>Tổng quan</span></a
        >
        <a class="nav__item" href="classes.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg
          ><span>Lớp học</span></a
        >
        <a class="nav__item" href="question-bank.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 20h9" />
            <path
              d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
            /></svg
          ><span>Câu hỏi</span></a
        >
        <a class="nav__item" href="manage-exams.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            />
            <polyline points="14 2 14 8 20 8" /></svg
          ><span>Đề thi</span></a
        >
        <a class="nav__item nav__item--active" href="results.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" /></svg
          ><span>Kết quả</span></a
        >
        <a class="nav__item" href="profile.html"
          ><svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" /></svg
          ><span>Tài khoản</span></a
        >
      </nav>
      <div class="sidebar__footer">
        <button class="nav__item nav__item--logout" id="logoutBtn">
          <svg
            class="nav__icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" /></svg
          ><span>Đăng xuất</span>
        </button>
      </div>
    </aside>
    <div class="backdrop" id="backdrop"></div>
    <div class="layout">
      <header class="header">
        <button class="header__menu" id="sidebarOpen" aria-label="Mở menu">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="icon"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <h1 class="header__title">Kết quả thi</h1>
        <span class="header__user" id="headerUser">Giáo viên</span>
      </header>
      <main class="main">
        <!-- Chọn đề thi để xem -->
        <div class="section">
          <h2 class="section__title">Chọn đề thi</h2>
          <div class="filter-row">
            <select class="field__input filter-select" id="examSelect">
              <option value="">-- Chọn đề thi --</option>
            </select>
          </div>
        </div>

        <!-- Thống kê tổng quan đề thi đang chọn -->
        <div id="summarySection" style="display: none">
          <div class="stats">
            <div class="stat-card">
              <span class="stat-card__label">Số lượt thi</span
              ><span class="stat-card__value" id="sTotal">—</span>
            </div>
            <div class="stat-card">
              <span class="stat-card__label">Điểm TB</span
              ><span class="stat-card__value" id="sAvg">—</span>
            </div>
            <div class="stat-card">
              <span class="stat-card__label">Điểm cao nhất</span
              ><span class="stat-card__value" id="sMax">—</span>
            </div>
            <div class="stat-card">
              <span class="stat-card__label">Điểm thấp nhất</span
              ><span class="stat-card__value" id="sMin">—</span>
            </div>
          </div>
        </div>

        <!-- Bảng kết quả từng học sinh -->
        <div class="section" id="resultSection" style="display: none">
          <div class="section__header">
            <h2 class="section__title">Chi tiết kết quả</h2>
            <button class="btn btn--ghost btn--sm" id="exportBtn">
              ↓ Xuất Excel
            </button>
          </div>
          <div class="table-wrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Mã số HS</th>
                  <th>Họ và tên</th>
                  <th>Điểm</th>
                  <th>Đúng/Tổng</th>
                  <th>Vi phạm</th>
                  <th>Thời gian nộp</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr>
                  <td colspan="6" class="table__empty">
                    Chọn đề thi để xem kết quả.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script>
      const token = localStorage.getItem("token"),
        role = localStorage.getItem("role");
      if (!token || role !== "teacher")
        window.location.href = "/pages/auth/login.html";
      const sidebar = document.getElementById("sidebar"),
        backdrop = document.getElementById("backdrop");
      document.getElementById("sidebarOpen").addEventListener("click", () => {
        sidebar.classList.add("sidebar--open");
        backdrop.classList.add("backdrop--visible");
        document.body.style.overflow = "hidden";
      });
      document.getElementById("sidebarClose").addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      backdrop.addEventListener("click", () => {
        sidebar.classList.remove("sidebar--open");
        backdrop.classList.remove("backdrop--visible");
        document.body.style.overflow = "";
      });
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "/pages/auth/login.html";
      });

      // Nếu URL có ?examId= thì tự động chọn
      const params = new URLSearchParams(window.location.search);
      const preExamId = params.get("examId");

      async function loadExams() {
        try {
          const res = await fetch("/api/teacher/exams", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const d = await res.json();
          if (!res.ok) return;
          document.getElementById("headerUser").textContent =
            d.teacherName ?? "Giáo viên";
          const sel = document.getElementById("examSelect");
          (d.exams ?? []).forEach((e) => {
            const opt = document.createElement("option");
            opt.value = e.id;
            opt.textContent = e.title;
            sel.appendChild(opt);
          });
          if (preExamId) {
            sel.value = preExamId;
            loadResults(preExamId);
          }
        } catch (e) {
          console.error(e);
        }
      }

      document.getElementById("examSelect").addEventListener("change", (e) => {
        if (e.target.value) loadResults(e.target.value);
      });

      async function loadResults(examId) {
        document.getElementById("summarySection").style.display = "none";
        document.getElementById("resultSection").style.display = "none";
        try {
          const res = await fetch(`/api/teacher/exams/${examId}/results`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const d = await res.json();
          if (!res.ok) return;

          // Thống kê
          const attempts = d.attempts ?? [];
          const scores = attempts.map((a) => a.score ?? 0);
          document.getElementById("sTotal").textContent = attempts.length;
          document.getElementById("sAvg").textContent = attempts.length
            ? (scores.reduce((s, v) => s + v, 0) / scores.length).toFixed(1)
            : "—";
          document.getElementById("sMax").textContent = attempts.length
            ? Math.max(...scores).toFixed(1)
            : "—";
          document.getElementById("sMin").textContent = attempts.length
            ? Math.min(...scores).toFixed(1)
            : "—";
          document.getElementById("summarySection").style.display = "block";

          // Bảng kết quả
          const tb = document.getElementById("tableBody");
          if (!attempts.length) {
            tb.innerHTML =
              '<tr><td colspan="6" class="table__empty">Chưa có học sinh nào nộp bài.</td></tr>';
          } else {
            tb.innerHTML = attempts
              .map(
                (a) => `<tr>
          <td><span class="code-badge">${a.studentId ?? "—"}</span></td>
          <td>${a.fullName ?? "—"}</td>
          <td><strong>${a.score != null ? a.score.toFixed(1) : "—"}</strong></td>
          <td>${a.correctCount ?? 0}/${a.totalQuestions ?? 0}</td>
          <td>${(a.violationCount ?? 0) > 0 ? `<span style="color:var(--color-danger);font-weight:600">${a.violationCount} lần</span>` : "Không có"}</td>
          <td>${a.finishedAt ? new Date(a.finishedAt).toLocaleString("vi-VN") : "—"}</td>
        </tr>`,
              )
              .join("");
          }
          document.getElementById("resultSection").style.display = "block";
        } catch (e) {
          console.error(e);
        }
      }

      document.getElementById("exportBtn").addEventListener("click", () => {
        const examId = document.getElementById("examSelect").value;
        if (!examId) return;
        // Gọi API xuất Excel — server trả về file
        window.open(
          `/api/teacher/exams/${examId}/export?token=${token}`,
          "_blank",
        );
      });

      loadExams();
    </script>
  </body>
</html>
